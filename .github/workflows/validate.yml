name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # Zero runtime dependencies — nothing to install.
      - name: Unit tests (parser, validator, engine)
        run: node tools/test.mjs
      - name: Validate all skills and knowledge objects
        run: node tools/di.mjs validate
      - name: Ensure the retrieval index is up to date
        run: node tools/di.mjs build-index --check
